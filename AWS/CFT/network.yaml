AWSTemplateFormatVersion: '2010-09-09'
Description: 'Promethium Intelligent Edge — VPC, Subnets, NAT Gateway, and optional Jumpbox'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "VPC Configuration"
        Parameters:
          - VpcName
          - VpcCidrBlock
      - Label:
          default: "EKS Configuration"
        Parameters:
          - EksClusterName
      - Label:
          default: "Jumpbox Configuration"
        Parameters:
          - CreateJumpbox
          - JumpboxName
          - JumpboxInstanceType
          - UseExistingInstanceProfile
    ParameterLabels:
      VpcName:
        default: "VPC Name"
      VpcCidrBlock:
        default: "VPC CIDR Block (minimum /22)"
      EksClusterName:
        default: "EKS Cluster Name (used for subnet tags)"
      CreateJumpbox:
        default: "Create Jumpbox EC2 Instance"
      JumpboxName:
        default: "Jumpbox Instance Name"
      JumpboxInstanceType:
        default: "Jumpbox Instance Type"
      UseExistingInstanceProfile:
        default: "Existing EC2 Instance Profile Name to attach to Jumpbox"

Parameters:
  VpcName:
    Type: String
    Default: promethium-vpc
    Description: Name tag for the VPC

  VpcCidrBlock:
    Type: String
    Default: 10.0.0.0/22
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    Description: CIDR block for the VPC (minimum /22 required). Will be split into 4 /24 subnets.

  EksClusterName:
    Type: String
    Default: promethium-datafabric-prod-eks-cluster
    Description: Name of the EKS cluster. Used to apply required kubernetes subnet tags.

  CreateJumpbox:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Whether to create an EC2 jumpbox instance for running Terraform.

  JumpboxName:
    Type: String
    Default: promethium-jumpbox
    Description: Name tag for the jumpbox EC2 instance.

  JumpboxInstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - m5.large
    Description: EC2 instance type for the jumpbox.

  UseExistingInstanceProfile:
    Type: String
    Default: ""
    Description: Name of an existing EC2 Instance Profile to attach to the jumpbox. Leave blank to launch without a profile.

Conditions:
  CreateJumpboxCondition: !Equals [!Ref CreateJumpbox, "true"]
  HasInstanceProfile: !Not [!Equals [!Ref UseExistingInstanceProfile, ""]]
  AttachInstanceProfile: !And
    - !Condition CreateJumpboxCondition
    - !Condition HasInstanceProfile

Resources:

  # ── VPC ───────────────────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Ref VpcName

  # ── Internet Gateway ──────────────────────────────────────────────────────────

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${VpcName}-igw

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ── Subnets ───────────────────────────────────────────────────────────────────
  # Subnet layout from a /22 (e.g. 10.0.0.0/22):
  #   Subnet1: .0.0/24  AZ-a  Private  EKS nodes
  #   Subnet2: .1.0/24  AZ-b  Private  EKS nodes
  #   Subnet3: .2.0/24  AZ-b  Public   ALB + NAT Gateway
  #   Subnet4: .3.0/24  AZ-a  Public   ALB

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidrBlock, 4, 8]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${VpcName}-private-1
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: !Sub kubernetes.io/cluster/${EksClusterName}
          Value: owned

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidrBlock, 4, 8]]
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${VpcName}-private-2
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: !Sub kubernetes.io/cluster/${EksClusterName}
          Value: owned

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidrBlock, 4, 8]]
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${VpcName}-public-1
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: !Sub kubernetes.io/cluster/${EksClusterName}
          Value: owned

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [3, !Cidr [!Ref VpcCidrBlock, 4, 8]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${VpcName}-public-2
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: !Sub kubernetes.io/cluster/${EksClusterName}
          Value: owned

  # ── NAT Gateway ───────────────────────────────────────────────────────────────

  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${VpcName}-nat-eip

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub ${VpcName}-nat

  # ── Route Tables ──────────────────────────────────────────────────────────────

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${VpcName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${VpcName}-private-rt

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ── Jumpbox ───────────────────────────────────────────────────────────────────

  JumpboxSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Promethium install jumpbox
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Outbound HTTPS for tool downloads and AWS APIs
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Outbound HTTP for package managers
      Tags:
        - Key: Name
          Value: !Sub ${JumpboxName}-sg

  JumpboxInstance:
    Type: AWS::EC2::Instance
    Condition: CreateJumpboxCondition
    Properties:
      InstanceType: !Ref JumpboxInstanceType
      SubnetId: !Ref PrivateSubnet1
      SecurityGroupIds:
        - !Ref JumpboxSecurityGroup
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      IamInstanceProfile: !If
        - AttachInstanceProfile
        - !Ref UseExistingInstanceProfile
        - !Ref AWS::NoValue
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Ref JumpboxName

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${AWS::StackName}-VpcId

  VpcCidrBlock:
    Description: VPC CIDR Block
    Value: !GetAtt VPC.CidrBlock
    Export:
      Name: !Sub ${AWS::StackName}-VpcCidrBlock

  Subnet1Id:
    Description: Private Subnet 1 ID (AZ-a) — use in vpc_info.subnet_ids
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub ${AWS::StackName}-Subnet1Id

  Subnet2Id:
    Description: Private Subnet 2 ID (AZ-b) — use in vpc_info.subnet_ids
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub ${AWS::StackName}-Subnet2Id

  Subnet3Id:
    Description: Public Subnet 1 ID (AZ-b) — ALB
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub ${AWS::StackName}-Subnet3Id

  Subnet4Id:
    Description: Public Subnet 2 ID (AZ-a) — ALB
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub ${AWS::StackName}-Subnet4Id

  JumpboxInstanceId:
    Description: Jumpbox EC2 Instance ID
    Condition: CreateJumpboxCondition
    Value: !Ref JumpboxInstance
    Export:
      Name: !Sub ${AWS::StackName}-JumpboxInstanceId

  JumpboxSecurityGroupId:
    Description: Jumpbox Security Group ID — use as jumpbox_sg_id in tfvars
    Value: !Ref JumpboxSecurityGroup
    Export:
      Name: !Sub ${AWS::StackName}-JumpboxSecurityGroupId
