AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Creates an S3 Gateway VPC endpoint and a Glue NETWORK connection
  for running Promethium Glue crawlers via private VPC networking.

  This template is account-agnostic — it works for both same-account
  (bucket in IE account) and cross-account (bucket in a different
  account) scenarios. The cross-account case requires only that the
  bucket policy in the data-owner account reference this stack's
  S3GatewayEndpointId via aws:SourceVpce.

Parameters:
  # --- VPC / Networking ---
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC hosting the EKS cluster and Glue crawler ENIs

  RouteTableIds:
    Type: CommaDelimitedList
    Description: >
      Route tables associated with the private subnets
      (must be used by the Glue crawler subnet)

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: >
      Private subnet for the Glue NETWORK connection.
      Must route to S3 via the Gateway endpoint, and must be in an AZ
      where the security group(s) below allow the required traffic.

  AvailabilityZone:
    Type: String
    Description: >
      Availability zone of SubnetId. Must match the subnet's AZ exactly.
      Glue stores this on the connection and uses it to place ENIs.

  SecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: >
      Security groups for the Glue crawler ENI. Requirements:
        - Outbound TCP 443 to 0.0.0.0/0 (or the S3 prefix list)
        - SELF-REFERENCING inbound rule (all ports from itself) — Glue
          NETWORK connections require this for ENI health checks.

  AwsRegion:
    Type: String
    Default: us-east-1
    Description: AWS region

  # --- Endpoint policy (optional) ---
  AddEndpointPolicy:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: >
      Whether to scope the S3 endpoint to specific buckets.
      Leave false unless you have a specific need — endpoint policies
      apply to ALL traffic through the endpoint and can break unrelated
      workloads.

  AllowedBucketArns:
    Type: List<String>
    Default: ''
    Description: >
      Optional list of S3 bucket ARNs (e.g. arn:aws:s3:::my-bucket)
      used when AddEndpointPolicy=true

  # --- Glue connection ---
  GlueConnectionName:
    Type: String
    Default: promethium-glue-connection
    Description: >
      Name of the Glue NETWORK connection. Do NOT use spaces — they
      survive into ARNs and make IAM resource conditions painful.
    AllowedPattern: '^[A-Za-z0-9._-]+$'
    ConstraintDescription: >
      Connection name may contain only letters, digits, dot, underscore, hyphen.

  GlueConnectionDescription:
    Type: String
    Default: Glue network connection for Promethium crawler

Conditions:
  UseEndpointPolicy: !Equals [!Ref AddEndpointPolicy, 'true']

Resources:
  # -----------------------------
  # S3 Gateway VPC Endpoint
  # -----------------------------
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Gateway
      RouteTableIds: !Ref RouteTableIds
      ServiceName: !Sub com.amazonaws.${AwsRegion}.s3
      PolicyDocument:
        Fn::If:
          - UseEndpointPolicy
          - Version: '2012-10-17'
            Statement:
              - Sid: AllowListBucket
                Effect: Allow
                Principal: '*'
                Action: s3:ListBucket
                Resource: !Ref AllowedBucketArns
              - Sid: AllowGetObject
                Effect: Allow
                Principal: '*'
                Action:
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource:
                  Fn::Join:
                    - ''
                    - - !Select [0, !Ref AllowedBucketArns]
                      - '/*'
          - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-s3-gateway-endpoint

  # -----------------------------
  # Glue NETWORK Connection
  # -----------------------------
  # NOTES (don't remove without reading the troubleshooting README):
  #   - ConnectionProperties MUST be present even for NETWORK connections.
  #     CloudFormation accepts {} but the Glue API rejects null. Some
  #     SDK/console paths require KAFKA_SSL_ENABLED to round-trip cleanly,
  #     so we set it explicitly to "false".
  #   - MatchCriteria is intentionally OMITTED. It is a JDBC-classifier
  #     hint that has no effect on NETWORK connections and can confuse
  #     downstream tooling that filters by it.
  GlueNetworkConnection:
    Type: AWS::Glue::Connection
    Properties:
      CatalogId: !Ref AWS::AccountId
      ConnectionInput:
        Name: !Ref GlueConnectionName
        Description: !Ref GlueConnectionDescription
        ConnectionType: NETWORK
        PhysicalConnectionRequirements:
          SubnetId: !Ref SubnetId
          AvailabilityZone: !Ref AvailabilityZone
          SecurityGroupIdList: !Ref SecurityGroupIds
        ConnectionProperties:
          KAFKA_SSL_ENABLED: 'false'

Outputs:
  S3GatewayEndpointId:
    Description: >
      S3 Gateway VPC endpoint ID. Use this value in the
      aws:SourceVpce condition of any bucket policy granting access
      to the crawler role (same- or cross-account).
    Value: !Ref S3GatewayEndpoint
    Export:
      Name: !Sub ${AWS::StackName}-S3GatewayEndpointId

  GlueConnectionName:
    Description: Glue connection name — set as GLUE_VPC_CONNECTION_NAME on the glue-crawler deployment.
    Value: !Ref GlueConnectionName
    Export:
      Name: !Sub ${AWS::StackName}-GlueConnectionName

  GlueConnectionSubnetAz:
    Description: AZ where the Glue connection's ENI will be placed.
    Value: !Ref AvailabilityZone
