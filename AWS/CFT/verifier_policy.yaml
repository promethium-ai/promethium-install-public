AWSTemplateFormatVersion: '2010-09-09'
Description: 'Adds pre-install verification permissions to the Promethium deployment role. Deploy this before running the Promethium verifier scripts from the jumpbox.'

Parameters:
  PromethiumInstallRole:
    Type: String
    Default: PromethiumDeploymentRole
    Description: Name of the Promethium deployment role to attach verifier permissions to

Resources:
  VerifierPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${PromethiumInstallRole}-verifier-policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFormationRead
            Effect: Allow
            Action:
              - cloudformation:DescribeStacks
              - cloudformation:ListStacks
            Resource: '*'
          - Sid: IAMDiscovery
            Effect: Allow
            Action:
              - iam:ListRoles
              - iam:ListAttachedRolePolicies
            Resource: '*'
          - Sid: EKSDescribe
            Effect: Allow
            Action:
              - eks:DescribeCluster
            Resource: '*'
      Roles:
        - !Ref PromethiumInstallRole

Outputs:
  PolicyArn:
    Description: ARN of the verifier managed policy
    Value: !Ref VerifierPolicy
