AWSTemplateFormatVersion: '2010-09-09'
Description: 'Adds pre-install verification permissions to the Promethium deployment role. Deploy this before running the Promethium verifier scripts from the jumpbox.'

Parameters:
  PromethiumInstallRole:
    Type: String
    Default: PromethiumDeploymentRole
    Description: Name of the Promethium deployment role to attach verifier permissions to

Resources:
  VerifierPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: promethium-verifier-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFormationRead
            Effect: Allow
            Action:
              - cloudformation:DescribeStacks
              - cloudformation:ListStacks
            Resource: '*'
          - Sid: IAMDiscovery
            Effect: Allow
            Action:
              - iam:ListRoles
              - iam:ListAttachedRolePolicies
            Resource: '*'
          - Sid: EKSDescribe
            Effect: Allow
            Action:
              - eks:DescribeCluster
            Resource: '*'
      Roles:
        - !Ref PromethiumInstallRole

# TODO: PolicyArn output is incorrect — AWS::IAM::Policy creates an inline policy
# (attached to the role), not a standalone managed policy. Inline policies do not
# have their own ARN. Either remove this output or switch to AWS::IAM::ManagedPolicy.
# Outputs:
#   PolicyArn:
#     Description: ARN of the verifier policy
#     Value: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/promethium-verifier-policy'
