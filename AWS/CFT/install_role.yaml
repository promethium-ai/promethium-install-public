AWSTemplateFormatVersion: '2010-09-09'
Description: 'Terraform Instance Profile Role for Promethium EKS Deployment'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Role Configuration"
        Parameters:
          - PromethiumInstallRole
          - Environment
    ParameterLabels:
      PromethiumInstallRole:
        default: "Promethium Terraform IAM Role Name"
      Environment:
        default: "Environment (dev/qa/preview/prod)"

Parameters:
  PromethiumInstallRole:
    Type: String
    Default: PromethiumDeploymentRole
    Description: IAM Role used by Terraform to deploy Promethium infrastructure

  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - qa
      - preview
      - prod
    Description: Deployment environment

Resources:

  # ── Managed Policies ────────────────────────────────────────────────────────

  EC2Policy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${PromethiumInstallRole}-ec2'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EC2CoreActions
            Effect: Allow
            Action:
              - ec2:AttachVolume
              - ec2:CreateLaunchTemplate
              - ec2:CreateLaunchTemplateVersion
              - ec2:DeleteLaunchTemplate
              - ec2:CreateKeyPair
              - ec2:DeleteKeyPair
              - ec2:CreateVolume
              - ec2:AttachNetworkInterface
              - ec2:DetachNetworkInterface
              - ec2:DeleteNetworkInterface
              - ec2:ModifyInstanceAttribute
              - ec2:RunInstances
              - ec2:TerminateInstances
              - ec2:DetachVolume
              - ec2:CreateNetworkInterface
            Resource:
              - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/*'
              - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:launch-template/*'
              - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:key-pair/*'
              - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:volume/*'
              - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:network-interface/*'
              - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*'
              - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:subnet/*'
              - !Sub 'arn:aws:ec2:${AWS::Region}::image/*'
          - Sid: EC2DescribeActions
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
              - ec2:DescribeInstanceAttribute
              - ec2:DescribeInstanceTypes
              - ec2:DescribeIamInstanceProfileAssociations
              - ec2:DescribeInstanceCreditSpecifications
              - ec2:DescribeVolumes
              - ec2:DescribeVolumesModifications
              - ec2:DescribeKeyPairs
              - ec2:DescribeLaunchTemplates
              - ec2:DescribeLaunchTemplateVersions
              - ec2:DescribeImages
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeTags
            Resource: "*"
          - Sid: EC2Tagging
            Effect: Allow
            Action:
              - ec2:CreateTags
              - ec2:DeleteTags
            Resource: "*"
          - Sid: SSMParameter
            Effect: Allow
            Action:
              - ssm:GetParameter
            Resource: !Sub 'arn:aws:ssm:${AWS::Region}::parameter/aws/service/eks/optimized-ami/*/amazon-linux-*/recommended/release_version'

  ACMPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${PromethiumInstallRole}-acm'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ACMGlobal
            Effect: Allow
            Action:
              - acm:RequestCertificate
              - acm:ListCertificates
              - acm:GetCertificate
            Resource: "*"
          - Sid: ACMCertActions
            Effect: Allow
            Action:
              - acm:DeleteCertificate
              - acm:DescribeCertificate
              - acm:AddTagsToCertificate
              - acm:ListTagsForCertificate
            Resource: !Sub 'arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/*'

  EFSPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${PromethiumInstallRole}-efs'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EFSFileSystemActions
            Effect: Allow
            Action:
              - elasticfilesystem:ModifyMountTargetSecurityGroups
              - elasticfilesystem:DescribeMountTargets
              - elasticfilesystem:UntagResource
              - elasticfilesystem:CreateMountTarget
              - elasticfilesystem:DescribeLifecycleConfiguration
              - elasticfilesystem:DescribeAccessPoints
              - elasticfilesystem:DescribeFileSystems
              - elasticfilesystem:DeleteMountTarget
              - elasticfilesystem:DeleteFileSystem
              - elasticfilesystem:TagResource
              - elasticfilesystem:DescribeMountTargetSecurityGroups
            Resource:
              - !Sub 'arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:access-point/*'
              - !Sub 'arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/*'
          - Sid: EFSCreateFS
            Effect: Allow
            Action:
              - elasticfilesystem:CreateFileSystem
            Resource: "*"

  EKSPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${PromethiumInstallRole}-eks'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EKSClusterActions
            Effect: Allow
            Action:
              - eks:UpdateClusterVersion
              - eks:ListNodegroups
              - eks:UntagResource
              - eks:ListTagsForResource
              - eks:UpdateClusterConfig
              - eks:CreateNodegroup
              - eks:DeleteCluster
              - eks:CreateFargateProfile
              - eks:UpdateNodegroupVersion
              - eks:ListFargateProfiles
              - eks:DescribeNodegroup
              - eks:ListUpdates
              - eks:DeleteNodegroup
              - eks:DescribeUpdate
              - eks:TagResource
              - eks:UpdateNodegroupConfig
              - eks:DescribeCluster
              - eks:CreateAddon
              - eks:DeleteAddon
              - eks:DescribeAddon
              - eks:UpdateAddon
              - eks:ListAddons
              - eks:DescribeAddonVersions
              - eks:AssociateAccessPolicy
              - eks:DisassociateAccessPolicy
              - eks:CreateAccessEntry
              - eks:DeleteAccessEntry
              - eks:DescribeAccessEntry
              - eks:ListAccessEntries
              - eks:ListAssociatedAccessPolicies
              - eks-auth:AssumeRoleForPodIdentity
            Resource:
              - !Sub 'arn:aws:eks:${AWS::Region}:${AWS::AccountId}:cluster/promethium*'
              - !Sub 'arn:aws:eks:${AWS::Region}:${AWS::AccountId}:nodegroup/promethium*/*/*'
              - !Sub 'arn:aws:eks:${AWS::Region}:${AWS::AccountId}:addon/promethium*/*/*'
          - Sid: EKSCreateCluster
            Effect: Allow
            Action:
              - eks:ListClusters
              - eks:CreateCluster
            Resource: !Sub 'arn:aws:eks:${AWS::Region}:${AWS::AccountId}:cluster/*'
          - Sid: ELBDescribe
            Effect: Allow
            Action:
              - elasticloadbalancing:DescribeLoadBalancerAttributes
              - elasticloadbalancing:DescribeLoadBalancers
              - elasticloadbalancing:DescribeTags
            Resource: "*"

  GluePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${PromethiumInstallRole}-glue'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: GlueDatabaseManagement
            Effect: Allow
            Action:
              - glue:CreateDatabase
              - glue:DeleteDatabase
              - glue:UpdateDatabase
              - glue:GetDatabase
              - glue:GetDatabases
            Resource:
              - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/*_trino'
              - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/*_trino*/*'
              - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/*trino*/*'
              - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:userDefinedFunction/*trino*/*'
              - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog'
          - Sid: GlueCatalogTagging
            Effect: Allow
            Action:
              - glue:GetTags
              - glue:TagResource
            Resource:
              - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog'
              - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/*_trino'
          - Sid: GlueReadOnly
            Effect: Allow
            Action:
              - glue:GetDatabase
              - glue:GetDatabases
            Resource: "*"

  S3KMSPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${PromethiumInstallRole}-s3-kms'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3BucketManagement
            Effect: Allow
            Action:
              - s3:CreateBucket
              - s3:DeleteBucket
              - s3:ListBucket
              - s3:GetBucketLocation
              - s3:DeleteObjectVersion
              - s3:PutBucketPolicy
              - s3:GetBucketPolicy
              - s3:DeleteBucketPolicy
              - s3:PutEncryptionConfiguration
              - s3:GetEncryptionConfiguration
              - s3:PutLifecycleConfiguration
              - s3:GetLifecycleConfiguration
              - s3:PutBucketVersioning
              - s3:GetBucketVersioning
              - s3:PutBucketTagging
              - s3:GetBucketTagging
              - s3:GetBucket*
              - s3:List*
              - s3:GetAccelerateConfiguration
              - s3:GetReplicationConfiguration
            Resource:
              - arn:aws:s3:::*trino-*
              - arn:aws:s3:::*postgres-backups-*
          - Sid: KMSCryptoAccess
            Effect: Allow
            Action:
              - kms:GenerateDataKey
              - kms:Decrypt
              - kms:Encrypt
              - kms:DescribeKey
              - kms:ReEncrypt*
            Resource: arn:aws:kms:*:*:key/*
          - Sid: KMSKeyManagement
            Effect: Allow
            Action:
              - kms:EnableKeyRotation
              - kms:EnableKey
              - kms:ListKeyPolicies
              - kms:UntagResource
              - kms:PutKeyPolicy
              - kms:GetKeyPolicy
              - kms:Verify
              - kms:ListResourceTags
              - kms:DisableKey
              - kms:DisableKeyRotation
              - kms:TagResource
              - kms:GetKeyRotationStatus
              - kms:ScheduleKeyDeletion
              - kms:CreateAlias
              - kms:DeleteAlias
              - kms:Sign
            Resource:
              - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/*'
              - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*'
          - Sid: KMSCreateList
            Effect: Allow
            Action:
              - kms:CreateKey
              - kms:ListAliases
            Resource: "*"

  VPCPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${PromethiumInstallRole}-vpc'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: VPCSubnetActions
            Effect: Allow
            Action:
              - ec2:CreateVpc
              - ec2:DeleteVpc
              - ec2:ModifyVpcAttribute
              - ec2:CreateSubnet
              - ec2:DeleteSubnet
              - ec2:ModifySubnetAttribute
            Resource: "*"
          - Sid: GatewayActions
            Effect: Allow
            Action:
              - ec2:CreateInternetGateway
              - ec2:DeleteInternetGateway
              - ec2:AttachInternetGateway
              - ec2:DetachInternetGateway
              - ec2:CreateNatGateway
              - ec2:DeleteNatGateway
              - ec2:AllocateAddress
              - ec2:ReleaseAddress
              - ec2:AssociateAddress
              - ec2:DisassociateAddress
            Resource: "*"
          - Sid: RouteActions
            Effect: Allow
            Action:
              - ec2:CreateRouteTable
              - ec2:DeleteRouteTable
              - ec2:CreateRoute
              - ec2:DeleteRoute
              - ec2:AssociateRouteTable
              - ec2:DisassociateRouteTable
            Resource: "*"
          - Sid: SecurityGroupActions
            Effect: Allow
            Action:
              - ec2:CreateSecurityGroup
              - ec2:DeleteSecurityGroup
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
              - ec2:AuthorizeSecurityGroupEgress
              - ec2:RevokeSecurityGroupEgress
            Resource:
              - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*'
              - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*'
          - Sid: VPCDescribeResources
            Effect: Allow
            Action:
              - ec2:DescribeVpcs
              - ec2:DescribeSubnets
              - ec2:DescribeInternetGateways
              - ec2:DescribeNatGateways
              - ec2:DescribeRouteTables
              - ec2:DescribeAddresses
              - ec2:DescribeAddressesAttribute
              - ec2:DescribeVpcAttribute
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeSecurityGroups
            Resource: "*"

  STSPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${PromethiumInstallRole}-sts'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PromethiumSTSAccess
            Effect: Allow
            Action:
              - sts:GetServiceBearerToken
              - sts:AssumeRole
            Resource:
              - arn:aws:iam::734236616923:role/promethium-terraform-saas-assume-role
              - arn:aws:iam::308611924187:role/promethium-terraform-saas-assume-role
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${PromethiumInstallRole}'

  IAMPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${PromethiumInstallRole}-iam'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: OIDCProviderManagement
            Effect: Allow
            Action:
              - iam:CreateOpenIDConnectProvider
              - iam:GetOpenIDConnectProvider
              - iam:DeleteOpenIDConnectProvider
              - iam:TagOpenIDConnectProvider
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/*'
          - Sid: EKSPassAndGetRole
            Effect: Allow
            Action:
              - iam:PassRole
              - iam:GetRole
              - iam:ListAttachedRolePolicies
              - iam:ListRolePolicies
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/*promethium*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/*datafabric*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/*eks*'
          - Sid: ServiceLinkedRoles
            Effect: Allow
            Action:
              - iam:CreateServiceLinkedRole
              - iam:DeleteServiceLinkedRole
            Resource: "*"
            Condition:
              StringEquals:
                iam:AWSServiceName:
                  - eks.amazonaws.com
                  - eks-nodegroup.amazonaws.com
                  - eks-addons.amazonaws.com
                  - glue.amazonaws.com
          - Sid: IAMRoleManagement
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:CreateInstanceProfile
              - iam:DeleteInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:RemoveRoleFromInstanceProfile
              - iam:TagRole
              - iam:UntagRole
              - iam:TagInstanceProfile
              - iam:ListInstanceProfilesForRole
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/*promethium*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/*datafabric*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/*promethium*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/*datafabric*'
          - Sid: IAMPolicyManagement
            Effect: Allow
            Action:
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:ListPolicyVersions
              - iam:TagPolicy
              - iam:ListPolicies
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/*promethium*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/*datafabric*'

  # ── Role + Instance Profile ──────────────────────────────────────────────────

  TerraformRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref PromethiumInstallRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - !Ref EC2Policy
        - !Ref ACMPolicy
        - !Ref EFSPolicy
        - !Ref EKSPolicy
        - !Ref GluePolicy
        - !Ref S3KMSPolicy
        - !Ref VPCPolicy
        - !Ref STSPolicy
        - !Ref IAMPolicy
      Path: /
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Product
          Value: Promethium
        - Key: Owner
          Value: support@promethium.ai
        - Key: createdBy
          Value: CloudFormation
        - Key: Project
          Value: Intelligentedge

  TerraformInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${PromethiumInstallRole}InstanceProfile'
      Path: /
      Roles:
        - !Ref TerraformRole

Outputs:
  RoleArn:
    Description: ARN of the Terraform role
    Value: !GetAtt TerraformRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'

  InstanceProfileArn:
    Description: ARN of the instance profile
    Value: !GetAtt TerraformInstanceProfile.Arn
    Export:
      Name: !Sub '${AWS::StackName}-InstanceProfileArn'

  InstanceProfileName:
    Description: Name of the instance profile
    Value: !Ref TerraformInstanceProfile
    Export:
      Name: !Sub '${AWS::StackName}-InstanceProfileName'
