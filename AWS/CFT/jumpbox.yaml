AWSTemplateFormatVersion: '2010-09-09'
Description: 'Promethium Intelligent Edge — Jumpbox EC2 instance for running Terraform'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Network (from network stack outputs)"
        Parameters:
          - VpcId
          - PrivateSubnet1Id
      - Label:
          default: "Jumpbox Configuration"
        Parameters:
          - JumpboxName
          - JumpboxInstanceType
          - UseExistingInstanceProfile
    ParameterLabels:
      VpcId:
        default: "VPC ID"
      PrivateSubnet1Id:
        default: "Private Subnet 1 ID (AZ-a)"
      JumpboxName:
        default: "Jumpbox Instance Name"
      JumpboxInstanceType:
        default: "Jumpbox Instance Type"
      UseExistingInstanceProfile:
        default: "Existing EC2 Instance Profile Name to attach to Jumpbox"

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID — from the network stack output VpcId.

  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: Private Subnet 1 ID (AZ-a) — from the network stack output Subnet1Id.

  JumpboxName:
    Type: String
    Default: promethium-jumpbox
    Description: Name tag for the jumpbox EC2 instance.

  JumpboxInstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - m5.large
    Description: EC2 instance type for the jumpbox.

  UseExistingInstanceProfile:
    Type: String
    Default: ""
    Description: Name of an existing EC2 Instance Profile to attach to the jumpbox. Leave blank to launch without a profile.

Conditions:
  HasInstanceProfile: !Not [!Equals [!Ref UseExistingInstanceProfile, ""]]

Resources:

  JumpboxSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Promethium install jumpbox
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Outbound HTTPS for tool downloads and AWS APIs
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Outbound HTTP for package managers
      Tags:
        - Key: Name
          Value: !Sub ${JumpboxName}-sg

  JumpboxInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref JumpboxInstanceType
      SubnetId: !Ref PrivateSubnet1Id
      SecurityGroupIds:
        - !Ref JumpboxSecurityGroup
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      IamInstanceProfile: !If
        - HasInstanceProfile
        - !Ref UseExistingInstanceProfile
        - !Ref AWS::NoValue
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Ref JumpboxName

Outputs:
  JumpboxInstanceId:
    Description: Jumpbox EC2 Instance ID
    Value: !Ref JumpboxInstance
    Export:
      Name: !Sub ${AWS::StackName}-JumpboxInstanceId

  JumpboxSecurityGroupId:
    Description: Jumpbox Security Group ID — use as jumpbox_sg_id in tfvars
    Value: !Ref JumpboxSecurityGroup
    Export:
      Name: !Sub ${AWS::StackName}-JumpboxSecurityGroupId
